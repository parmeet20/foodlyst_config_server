spring:
  application:
    name: balanceService
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/balance
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:9092

  zipkin:  # ADDED Zipkin configuration
    base-url: http://${ZIPKIN_HOST}:9411
    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_URL}:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*" 
server:
  port: 8081
