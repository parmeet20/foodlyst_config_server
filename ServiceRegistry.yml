spring:
  application:
    name: ServiceRegistry
    
eureka:
  instance:
    hostname: eureka-server
  client:
    hostname: "${HOSTNAME}.eureka"
    register-with-eureka: false   # don't register itself
    fetch-registry: false         # don't fetch registry from peers
    service-url:
      defaultZone: ${EUREKA_SERVER_ADDRESS}
      

management:
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8761
